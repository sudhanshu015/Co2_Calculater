<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Carbon Footprint Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="container">
  <header>
    <h1>🌱 Carbon Footprint Calculator</h1>
    <p>Choose your vehicle and distance, then view the CO₂ result on a dedicated report page with print and download options.</p>
  </header>

  <div class="form-group">
    <label for="vehicle">Vehicle Type</label>
    <select id="vehicle">
      <option value="0.171">Car (Diesel, Medium)</option>
      <option value="0.192">Car (Petrol, Medium)</option>
      <option value="0.240">SUV (Petrol, Large)</option>
      <option value="0.220">SUV (Diesel, Large)</option>
      <option value="0.185">SUV (CNG, Large)</option>
      <option value="0.120">Car (CNG, Small)</option>
      <option value="0.103">Motorbike (Small)</option>
      <option value="0.089">Bus (Diesel, Large)</option>
      <option value="0.065">Bus (CNG, Large)</option>
      <option value="0.061">Train (Regional)</option>
      <option value="0.055">Metro / Tram</option>
      <option value="0.210">Truck / Lorry</option>
    </select>
  </div>

  <div class="form-group">
    <label for="distance">Distance (in kilometers)</label>
    <input type="number" id="distance" placeholder="e.g. 50" min="1">
  </div>

  <button id="calculateButton" type="button">Calculate Emissions</button>
  <p class="feedback" id="feedback" aria-live="polite"></p>
</div>

<script src="script.js"></script>

</body>
</html>
